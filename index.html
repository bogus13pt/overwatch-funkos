<style>
:root{--bg:#07070f;--surface:#0e0e1e;--surface2:#14142a;--border:rgba(255,255,255,0.07);--border-bright:rgba(255,255,255,0.15);--orange:#f97316;--orange-dim:rgba(249,115,22,0.15);--yellow:#fbbf24;--green:#22c55e;--text:#e8eaf0;--muted:#5a6070;--muted2:#8892a4;--radius:14px;--card-w:162px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.5}
header{position:relative;overflow:hidden;padding:64px 24px 48px;text-align:center;background:linear-gradient(180deg,#0d0d22 0%,var(--bg) 100%);border-bottom:1px solid var(--border)}
header::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 60% at 50% -20%,rgba(249,115,22,.18) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 80% 80% at 50% 0%,black,transparent)}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:var(--orange);margin-bottom:16px;position:relative;z-index:1}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,12vw,7.5rem);letter-spacing:6px;line-height:.9;position:relative;z-index:1;background:linear-gradient(135deg,#f97316 0%,#fbbf24 35%,#e2e8f0 70%,#38bdf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:13px;color:var(--muted2);margin-top:14px;position:relative;z-index:1;letter-spacing:.5px}
.subtitle strong{color:var(--orange);font-weight:600}
.stats{display:flex;justify-content:center;gap:0;margin:28px auto 0;max-width:500px;position:relative;z-index:1;border:1px solid var(--border-bright);border-radius:12px;overflow:hidden;backdrop-filter:blur(8px);background:rgba(14,14,30,.6)}
.stat{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--text);line-height:1}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.controls{max-width:1240px;margin:32px auto 0;padding:0 20px}
.search-wrap{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
input[type="text"]{width:100%;background:var(--surface);border:1px solid var(--border-bright);border-radius:10px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;padding:13px 18px 13px 44px;outline:none;transition:border-color .2s,box-shadow .2s}
input[type="text"]:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim)}
input[type="text"]::placeholder{color:var(--muted)}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.filter-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-right:4px;white-space:nowrap}
.filter-btn{background:transparent;border:1px solid var(--border-bright);border-radius:999px;color:var(--muted2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 14px;transition:all .15s;white-space:nowrap}
.filter-btn:hover{background:rgba(255,255,255,.06);color:var(--text);border-color:rgba(255,255,255,.25)}
.filter-btn.active{color:#000;border-color:transparent}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:8px}
.owned-pill{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--green);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.count-pill{font-size:12px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.view-toggle{display:flex;gap:4px}
.view-btn{background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--muted);cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.view-btn.active{background:var(--orange);border-color:var(--orange);color:#000}
.section-label{max-width:1240px;margin:28px auto 12px;padding:0 20px;display:flex;align-items:center;gap:14px}
.section-label span{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.grid{max-width:1240px;margin:0 auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:12px}
.grid.list-view{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;transition:transform .2s,box-shadow .2s,border-color .2s;animation:rise .35s ease both}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-5px)}
.card.owned{outline:2px solid var(--green);outline-offset:-1px;background:var(--surface2)}
.card-img{height:175px;background:#09091a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:transform .35s}
.card:hover .card-img img{transform:scale(1.1)}
.placeholder{width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:16px;display:none}
.ph-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;opacity:.9}
.ph-name{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center;opacity:.4;line-height:1.3}
.wave-badge{position:absolute;top:8px;left:8px;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:999px;color:#000;z-index:2;white-space:nowrap}
.owned-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);background:rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:rgba(255,255,255,.3);transition:all .15s;user-select:none;z-index:2;backdrop-filter:blur(4px)}
.owned-btn:hover{border-color:var(--green);color:var(--green)}
.owned-btn.owned{background:var(--green);border-color:var(--green);color:#000}
.card-body{padding:10px 12px 13px}
.card-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--muted);margin-bottom:3px;text-transform:uppercase}
.card-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.2;margin-bottom:6px;letter-spacing:.3px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.size-tag{font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 6px;border-radius:4px;white-space:nowrap}
.excl-tag{font-size:9px;color:var(--muted2)}
.excl-tag::before{content:'★ ';color:var(--yellow);font-size:8px}
.grid.list-view .card{display:flex;flex-direction:row;align-items:center}
.grid.list-view .card-img{width:80px;height:80px;flex-shrink:0;border-radius:0}
.grid.list-view .card-img img{padding:4px}
.grid.list-view .card-body{flex:1;padding:10px 14px;display:flex;align-items:center;gap:16px}
.grid.list-view .card-name{margin-bottom:0;font-size:15px}
.grid.list-view .wave-badge{top:6px;left:6px;font-size:7px;padding:2px 6px}
.grid.list-view .owned-btn{top:6px;right:6px}
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:.4}
.empty p{font-family:'Barlow Condensed',sans-serif;font-size:18px;letter-spacing:1px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:99px}
@media(max-width:480px){:root{--card-w:140px}h1{font-size:3.5rem}}
</style>
</head>

];
const packs=[
  {name:"Roadhog & Junkrat",                        wave:"2-Pack", excl:"SDCC 2018 / Blizzard", col:"#f59e0b",img:"imgs/pack-roadhog-junkrat.webp"},
  {name:"Hanzo & Genji",                            wave:"2-Pack", excl:"E3 Expo 2019",         col:"#22c55e",img:"imgs/pack-hanzo-genji.jpg"},
  {name:"Reinhardt & Brigitte",                     wave:"2-Pack", excl:"Blizzard",             col:"#78716c",img:"imgs/pack-reinhardt-brigitte.jpg"},
  {name:"Sombra / Zarya / Junkrat / Mercy (Glow)",  wave:"4-Pack", excl:"Exclusive",            col:"#a855f7",img:"imgs/pack-sombra-zarya-junkrat-mercy-glow-.jpg"},
];
const waveColors={"Wave 1":"#f97316","Wave 2":"#eab308","Wave 3":"#22c55e","Wave 4":"#3b82f6","Wave 5":"#a855f7","Wave 6":"#ec4899","OW2":"#06b6d4","2-Pack":"#fbbf24","4-Pack":"#f472b6"};
const waveFilters=["All","Wave 1","Wave 2","Wave 3","Wave 4","Wave 5","Wave 6","OW2","Packs"];
let activeWave="All",viewMode="grid";
const owned=new Set(JSON.parse(localStorage.getItem("ow_owned")||"[]"));
const allItems=[...pops,...packs];

function sizeStyle(s){if(s==='6"')return{bg:"#f59e0b",fg:"#000"};if(s==='10"')return{bg:"#f43f5e",fg:"#fff"};return{bg:"rgba(255,255,255,0.08)",fg:"#8892a4"}}
function itemKey(d){return(d.num||"pack")+"|"+d.name}

function makeCard(data,delay){
  const wc=waveColors[data.wave]||"#f97316",key=itemKey(data),isOwned=owned.has(key);
  const card=document.createElement("div");
  card.className="card"+(isOwned?" owned":"");
  card.style.animationDelay=delay+"s";
  const imgArea=document.createElement("div");imgArea.className="card-img";
  const img=document.createElement("img");img.alt=data.name;img.loading="lazy";img.src=data.img;
  const ph=document.createElement("div");ph.className="placeholder";ph.style.cssText="display:none;background:"+wc+"10";
  const short=data.name.replace(/\s*\(.*?\)/g,"").trim();
  ph.innerHTML=`<div class="ph-num" style="color:${wc}">${data.num||"•"}</div><div class="ph-name" style="color:${wc}">${short.toUpperCase()}</div>`;
  img.onerror=()=>{img.style.display="none";ph.style.display="flex"};
  imgArea.appendChild(ph);imgArea.appendChild(img);
  const badge=document.createElement("div");badge.className="wave-badge";badge.style.background=wc;badge.textContent=data.wave;imgArea.appendChild(badge);
  const ownBtn=document.createElement("div");ownBtn.className="owned-btn"+(isOwned?" owned":"");ownBtn.textContent="✓";
  ownBtn.addEventListener("click",e=>{
    e.stopPropagation();
    if(owned.has(key)){owned.delete(key);ownBtn.classList.remove("owned");card.classList.remove("owned");}
    else{owned.add(key);ownBtn.classList.add("owned");card.classList.add("owned");}
    localStorage.setItem("ow_owned",JSON.stringify([...owned]));updateStats();
  });
  imgArea.appendChild(ownBtn);card.appendChild(imgArea);
  const ss=sizeStyle(data.size);
  const body=document.createElement("div");body.className="card-body";
  body.innerHTML=`${data.num?`<div class="card-num">#${data.num}</div>`:""}<div class="card-name">${data.name}</div><div class="card-tags">${data.size?`<span class="size-tag" style="background:${ss.bg};color:${ss.fg}">${data.size}</span>`:""} ${data.excl?`<span class="excl-tag">${data.excl}</span>`:""}</div>`;
  card.appendChild(body);
  card.addEventListener("mouseenter",()=>{card.style.borderColor=wc+"60";card.style.boxShadow=`0 16px 40px ${wc}20`});
  card.addEventListener("mouseleave",()=>{card.style.borderColor="";card.style.boxShadow=""});
  return card;
}

function render(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  const out=document.getElementById("output");out.innerHTML="";
  const showPacks=activeWave==="All"||activeWave==="Packs";
  const showSingles=activeWave!=="Packs";
  let total=0;
  if(showSingles){
    const f=pops.filter(p=>(activeWave==="All"||p.wave===activeWave)&&(!q||p.name.toLowerCase().includes(q)||p.num.includes(q)||p.wave.toLowerCase().includes(q)));
    total+=f.length;
    if(f.length){const g=document.createElement("div");g.className="grid"+(viewMode==="list"?" list-view":"");f.forEach((p,i)=>g.appendChild(makeCard(p,Math.min(i*.015,.3))));out.appendChild(g);}
  }
  if(showPacks){
    const f=packs.filter(p=>!q||p.name.toLowerCase().includes(q)||p.wave.toLowerCase().includes(q));
    total+=f.length;
    if(f.length){
      const lbl=document.createElement("div");lbl.className="section-label";lbl.innerHTML="<span>MULTI-PACKS</span>";out.appendChild(lbl);
      const g=document.createElement("div");g.className="grid"+(viewMode==="list"?" list-view":"");f.forEach((p,i)=>g.appendChild(makeCard(p,Math.min(i*.05,.2))));out.appendChild(g);
    }
  }
  if(!total){const g=document.createElement("div");g.className="grid";g.innerHTML=`<div class="empty"><div class="empty-icon">⊘</div><p>No figures match "${q}"</p></div>`;out.appendChild(g);}
  document.getElementById("countPill").textContent=`Showing ${total} item${total!==1?"s":""}`;
  updateStats();
}

function updateStats(){
  const t=allItems.length,n=owned.size,pct=t>0?Math.round(n/t*100):0;
  document.getElementById("statOwned").textContent=n;
  document.getElementById("statTotal").textContent=t;
  document.getElementById("statPct").textContent=pct+"%";
  document.getElementById("totalCount").textContent=t;
  document.getElementById("ownedCount").textContent=`✓ ${n} owned`;
}

function setView(mode){
  viewMode=mode;
  document.getElementById("gridViewBtn").classList.toggle("active",mode==="grid");
  document.getElementById("listViewBtn").classList.toggle("active",mode==="list");
  render();
}

const filtersEl=document.getElementById("filters");
waveFilters.forEach(w=>{
  const btn=document.createElement("button");
  btn.className="filter-btn"+(w==="All"?" active":"");
  btn.textContent=w;
  const wc=w==="All"?"#f97316":w==="Packs"?"#fbbf24":(waveColors[w]||"#f97316");
  if(w==="All")btn.style.cssText=`background:${wc};color:#000;border-color:${wc}`;
  btn.addEventListener("click",()=>{
    activeWave=w;
    document.querySelectorAll(".filter-btn").forEach(b=>{b.classList.remove("active");b.style.cssText=""});
    btn.classList.add("active");btn.style.cssText=`background:${wc};color:#000;border-color:${wc}`;
    render();
  });
  filtersEl.appendChild(btn);
});

updateStats();render();
document.getElementById("search").addEventListener("input",render);
</script>
